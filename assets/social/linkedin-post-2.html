<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html,body{margin:0;width:1080px;height:1080px;font-family:Arial,Helvetica,sans-serif}
  .canvas{position:relative;width:1080px;height:1080px;background:linear-gradient(180deg,#351019 0%,#12040b 100%);color:#fff;overflow:hidden}
  .stripe{position:absolute;left:0;top:0;width:1080px;height:150px;background:repeating-linear-gradient(135deg,#ffbc00 0 54px,#ffd665 54px 108px)}
  .tag{position:absolute;left:90px;top:220px;background:#ff4f63;color:#fff;padding:14px 20px;border-radius:14px;font-size:30px;font-weight:800}
  .card{position:absolute;left:60px;top:180px;width:960px;height:780px;background:#1b060c;border:2px solid rgba(165,66,88,.55);border-radius:26px;padding:140px 40px 40px;box-sizing:border-box}
  .h1{font-size:112px;font-weight:900;line-height:.95;margin:0}
  .gold{color:#ffd68c}
  .h2{font-size:74px;font-weight:900;margin:22px 0 0}
  .b{font-size:45px;line-height:1.2;color:#ffdede;margin-top:42px}
  .url{position:absolute;left:90px;bottom:70px;width:900px;background:#fff;color:#1b060c;border-radius:16px;padding:22px 30px;font-size:38px;font-weight:800;box-sizing:border-box}
</style>
</head>
<body>
<div class="canvas">
  <div class="stripe"></div>
  <div class="card">
    <p class="h1">STOP RENTING</p>
    <p class="h1 gold">YOUR AI STACK</p>
    <p class="h2">Clone it. Own it.</p>
    <div class="b">GitHub repo signals + issue answers</div>
    <div class="b">+ Reddit validation in one workflow</div>
    <div class="b">No platform lock-in</div>
  </div>
  <div class="tag">REAL TALK FOR BUILDERS</div>
  <div class="url">github.com/smanthey/InayanBuilderBot</div>
</div>
</body>
</html>
