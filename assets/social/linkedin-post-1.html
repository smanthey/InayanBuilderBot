<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html,body{margin:0;width:1080px;height:1080px;font-family:Arial,Helvetica,sans-serif}
  .canvas{position:relative;width:1080px;height:1080px;background:linear-gradient(180deg,#0a1738 0%,#020915 100%);color:#fff;overflow:hidden}
  .orb{position:absolute;border:4px solid;border-radius:50%;width:160px;height:160px;top:48px}
  .o1{left:76px;border-color:#00bfff}.o2{left:326px;border-color:#4effba}.o3{left:576px;border-color:#ffbf3f}
  .tag{position:absolute;left:70px;top:90px;background:#00a8ff;color:#081325;padding:18px 26px;border-radius:16px;font-size:40px;font-weight:800}
  .card{position:absolute;left:60px;top:220px;width:960px;height:700px;background:#081226;border:2px solid rgba(80,120,210,.5);border-radius:26px;padding:80px 40px;box-sizing:border-box}
  .h1{font-size:128px;font-weight:900;line-height:.94;margin:0}
  .cyan{color:#00ddff}
  .h2{font-size:78px;font-weight:900;line-height:1;margin:10px 0 0}
  .mint{color:#79ffcb}
  .b{font-size:48px;line-height:1.2;color:#d5e6ff;margin-top:48px}
  .url{position:absolute;left:90px;bottom:70px;width:900px;background:#fff;color:#081226;border-radius:16px;padding:22px 30px;font-size:38px;font-weight:800;box-sizing:border-box}
</style>
</head>
<body>
<div class="canvas">
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
  <div class="tag">OPEN SOURCE DROP</div>
  <div class="card">
    <p class="h1">SAVE <span class="cyan">$1,000s</span></p>
    <p class="h2">Build your own</p>
    <p class="h2 mint">AI Builder Agent</p>
    <div class="b">GitHub + Reddit research</div>
    <div class="b">Benchmark-first planning</div>
    <div class="b">Own your stack</div>
  </div>
  <div class="url">github.com/smanthey/InayanBuilderBot</div>
</div>
</body>
</html>
